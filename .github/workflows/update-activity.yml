name: Update Commit Activity Tracker

on:
  workflow_dispatch: # Allows manual execution

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.SPONSORS_API_TOKEN_REPO }}" | gh auth login --with-token

      - name: Run Tracker Engine
        env:
          GITHUB_TOKEN: ${{ secrets.SPONSORS_API_TOKEN_REPO }}
        # Executes the script directly without a .csproj file
        run: dotnet run .github/scripts/UpdateActivity.cs

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/activity-tracker.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated update of commit activity tracker [skip ci]" && git push)